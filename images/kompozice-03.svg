<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Abstraktní kompozice — kruhová vínová forma na krémovém poli">
  <defs>
    <radialGradient id="k3bg" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0" stop-color="#F9F5F0"/>
      <stop offset="1" stop-color="#EDE6DD"/>
    </radialGradient>
    <radialGradient id="k3orb" cx="0.4" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#4A2538"/>
      <stop offset="1" stop-color="#1E0E18"/>
    </radialGradient>
    <filter id="k3grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" seed="17"/>
      <feColorMatrix values="0 0 0 0 0.19  0 0 0 0 0.09  0 0 0 0 0.16  0 0 0 0.22 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="1200" fill="url(#k3bg)"/>
  <!-- stroke base -->
  <path d="M 50 1080 Q 600 1020 1150 1080" stroke="#301728" stroke-width="2" fill="none" opacity="0.25"/>
  <!-- main orb -->
  <circle cx="600" cy="600" r="340" fill="url(#k3orb)" filter="url(#k3grain)"/>
  <!-- ring highlight -->
  <circle cx="600" cy="600" r="340" fill="none" stroke="#F4EFEA" stroke-width="2" opacity="0.35"/>
  <!-- sky glow -->
  <ellipse cx="460" cy="460" rx="80" ry="120" fill="#B7D4EA" opacity="0.35" transform="rotate(-25 460 460)"/>
  <!-- satellite dot -->
  <circle cx="950" cy="280" r="32" fill="#8FB8D4" opacity="0.75"/>
</svg>
