<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Ukázka portrétu — profil ve vínovém tónu">
  <defs>
    <linearGradient id="p1bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EDE6DD"/>
      <stop offset="1" stop-color="#F9F5F0"/>
    </linearGradient>
    <radialGradient id="p1glow" cx="0.35" cy="0.45" r="0.55">
      <stop offset="0" stop-color="#F4EFEA" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#EDE6DD" stop-opacity="0"/>
    </radialGradient>
    <filter id="p1grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.19  0 0 0 0 0.09  0 0 0 0 0.16  0 0 0 0.12 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="1200" fill="url(#p1bg)"/>
  <rect width="1200" height="1200" fill="url(#p1glow)"/>
  <!-- profile silhouette -->
  <path d="M820 260 C 900 330 940 430 935 540 C 930 620 905 680 870 735 C 855 770 865 805 890 830 L 900 880 C 905 930 870 960 820 960 L 720 960 C 640 960 580 905 560 820 C 545 760 555 700 580 645 C 610 580 655 540 700 510 C 740 480 755 440 745 400 C 735 340 770 285 820 260 Z" fill="#301728" opacity="0.78" filter="url(#p1grain)"/>
  <!-- soft brush stroke accent -->
  <path d="M 200 820 Q 400 780 620 830 T 1050 860" stroke="#4A2538" stroke-width="3" fill="none" opacity="0.35"/>
  <path d="M 180 870 Q 380 830 600 880 T 1020 910" stroke="#4A2538" stroke-width="1.5" fill="none" opacity="0.25"/>
  <!-- highlight -->
  <ellipse cx="760" cy="520" rx="40" ry="90" fill="#F4EFEA" opacity="0.25" transform="rotate(-20 760 520)"/>
</svg>
