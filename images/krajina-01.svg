<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Krajina — horizont nad zemitou plání">
  <defs>
    <linearGradient id="kr1sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B7D4EA"/>
      <stop offset="0.7" stop-color="#F4EFEA"/>
      <stop offset="1" stop-color="#EDE6DD"/>
    </linearGradient>
    <linearGradient id="kr1ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4A2538"/>
      <stop offset="1" stop-color="#1E0E18"/>
    </linearGradient>
    <filter id="kr1grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="3" seed="41"/>
      <feColorMatrix values="0 0 0 0 0.19  0 0 0 0 0.09  0 0 0 0 0.16  0 0 0 0.25 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>
  <!-- sky -->
  <rect width="1200" height="720" fill="url(#kr1sky)"/>
  <!-- ground -->
  <path d="M 0 720 Q 300 690 600 710 T 1200 700 L 1200 1200 L 0 1200 Z" fill="url(#kr1ground)" filter="url(#kr1grain)"/>
  <!-- sun -->
  <circle cx="860" cy="420" r="80" fill="#F9F5F0" opacity="0.8"/>
  <circle cx="860" cy="420" r="140" fill="#F4EFEA" opacity="0.25"/>
  <!-- mid layer -->
  <path d="M 0 760 Q 250 740 500 755 T 1200 745 L 1200 820 L 0 820 Z" fill="#301728" opacity="0.55"/>
  <!-- foreground brush -->
  <path d="M 0 960 Q 300 920 600 950 T 1200 940" stroke="#F4EFEA" stroke-width="3" fill="none" opacity="0.25"/>
  <path d="M 0 1040 Q 250 1000 550 1020 T 1200 1010" stroke="#F4EFEA" stroke-width="2" fill="none" opacity="0.2"/>
  <!-- lone silhouette -->
  <rect x="380" y="690" width="4" height="38" fill="#1E0E18"/>
</svg>
