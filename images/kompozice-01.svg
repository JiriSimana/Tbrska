<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Abstraktní kompozice — vertikální pás modré a vínové">
  <defs>
    <linearGradient id="k1bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B7D4EA" stop-opacity="0.7"/>
      <stop offset="0.45" stop-color="#F4EFEA"/>
      <stop offset="1" stop-color="#301728" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="k1grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="5"/>
      <feColorMatrix values="0 0 0 0 0.19  0 0 0 0 0.09  0 0 0 0 0.16  0 0 0 0.25 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="1200" fill="url(#k1bg)"/>
  <rect width="1200" height="1200" fill="#F4EFEA" opacity="0.0" filter="url(#k1grain)"/>
  <!-- diagonal brush strokes crossing -->
  <path d="M 100 1150 Q 450 700 800 400 T 1200 -50" stroke="#1E0E18" stroke-width="60" fill="none" opacity="0.25" stroke-linecap="round"/>
  <path d="M -50 300 Q 350 420 700 500 T 1250 680" stroke="#4A2538" stroke-width="40" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M 150 1050 Q 400 800 650 650 T 1100 200" stroke="#F9F5F0" stroke-width="12" fill="none" opacity="0.55" stroke-linecap="round"/>
  <!-- wine drip -->
  <circle cx="920" cy="920" r="80" fill="#1E0E18" opacity="0.55"/>
  <ellipse cx="240" cy="340" rx="120" ry="80" fill="#8FB8D4" opacity="0.6" transform="rotate(-18 240 340)"/>
</svg>
