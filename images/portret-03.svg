<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Ukázka portrétu — čelní obrys v zemitých tónech">
  <defs>
    <linearGradient id="p3bg" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#EDE6DD"/>
      <stop offset="0.6" stop-color="#F4EFEA"/>
      <stop offset="1" stop-color="#F9F5F0"/>
    </linearGradient>
    <filter id="p3grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" seed="13"/>
      <feColorMatrix values="0 0 0 0 0.29  0 0 0 0 0.14  0 0 0 0 0.22  0 0 0 0.14 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="1200" fill="url(#p3bg)"/>
  <!-- frontal face oval -->
  <ellipse cx="600" cy="560" rx="310" ry="400" fill="#4A2538" opacity="0.78" filter="url(#p3grain)"/>
  <!-- neck -->
  <path d="M 480 920 L 520 1020 Q 600 1080 680 1020 L 720 920 Z" fill="#4A2538" opacity="0.7"/>
  <!-- soft wash highlight on face -->
  <ellipse cx="520" cy="480" rx="80" ry="140" fill="#F4EFEA" opacity="0.18" transform="rotate(-10 520 480)"/>
  <!-- shadow -->
  <ellipse cx="700" cy="620" rx="90" ry="180" fill="#1E0E18" opacity="0.22" transform="rotate(14 700 620)"/>
  <!-- brush stroke bottom -->
  <path d="M 100 1120 Q 400 1080 600 1110 T 1100 1100" stroke="#301728" stroke-width="4" fill="none" opacity="0.3"/>
</svg>
