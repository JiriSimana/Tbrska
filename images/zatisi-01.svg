<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Zátiší — náznak vázy a ovoce v krémových tónech">
  <defs>
    <linearGradient id="z1bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F9F5F0"/>
      <stop offset="0.65" stop-color="#EDE6DD"/>
      <stop offset="1" stop-color="#E5DDD3"/>
    </linearGradient>
    <filter id="z1grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="23"/>
      <feColorMatrix values="0 0 0 0 0.29  0 0 0 0 0.14  0 0 0 0 0.22  0 0 0 0.13 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="1200" fill="url(#z1bg)"/>
  <!-- table line -->
  <line x1="60" y1="880" x2="1140" y2="880" stroke="#4A2538" stroke-width="2" opacity="0.5"/>
  <!-- vase -->
  <path d="M 480 500 Q 470 560 490 620 L 480 860 Q 530 880 600 880 L 600 880 Q 670 880 720 860 L 710 620 Q 730 560 720 500 Q 690 480 600 480 Q 510 480 480 500 Z" fill="#301728" opacity="0.75" filter="url(#z1grain)"/>
  <!-- fruit -->
  <circle cx="340" cy="860" r="48" fill="#4A2538" opacity="0.68"/>
  <circle cx="260" cy="875" r="34" fill="#8FB8D4" opacity="0.55"/>
  <!-- flower stems -->
  <path d="M 600 490 Q 540 380 520 260" stroke="#1E0E18" stroke-width="3" fill="none" opacity="0.55"/>
  <path d="M 600 490 Q 680 400 720 280" stroke="#1E0E18" stroke-width="3" fill="none" opacity="0.55"/>
  <ellipse cx="520" cy="240" rx="28" ry="32" fill="#B7D4EA" opacity="0.7"/>
  <ellipse cx="730" cy="260" rx="24" ry="28" fill="#F4EFEA" opacity="0.95"/>
  <!-- cast shadow -->
  <ellipse cx="600" cy="895" rx="180" ry="14" fill="#1E0E18" opacity="0.2"/>
</svg>
