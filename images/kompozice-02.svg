<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Abstraktní kompozice — modrý band s vínovou kapkou">
  <defs>
    <linearGradient id="k2bg" x1="0" y1="0" x2="1" y2="0.7">
      <stop offset="0" stop-color="#F9F5F0"/>
      <stop offset="0.55" stop-color="#B7D4EA" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#8FB8D4"/>
    </linearGradient>
    <filter id="k2soft"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="k2grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="11"/>
      <feColorMatrix values="0 0 0 0 0.19  0 0 0 0 0.09  0 0 0 0 0.16  0 0 0 0.14 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="1200" fill="url(#k2bg)"/>
  <rect width="1200" height="1200" fill="#F4EFEA" filter="url(#k2grain)" opacity="0.0"/>
  <!-- large soft wine blob -->
  <ellipse cx="760" cy="620" rx="280" ry="220" fill="#301728" opacity="0.72" filter="url(#k2soft)"/>
  <!-- cream shape breaking through -->
  <path d="M 100 760 Q 350 600 620 720 T 1150 660" stroke="#F4EFEA" stroke-width="80" fill="none" opacity="0.7" stroke-linecap="round"/>
  <!-- faint stroke -->
  <path d="M 80 400 Q 400 360 720 420 T 1200 480" stroke="#1E0E18" stroke-width="3" fill="none" opacity="0.35"/>
  <path d="M 80 440 Q 400 400 720 460 T 1200 520" stroke="#1E0E18" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
