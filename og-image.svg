<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="tbrska — portréty a abstrakce malované ručně">
  <defs>
    <linearGradient id="ogbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4EFEA"/>
      <stop offset="1" stop-color="#EDE6DD"/>
    </linearGradient>
    <radialGradient id="ogblob" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#B7D4EA" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#B7D4EA" stop-opacity="0"/>
    </radialGradient>
    <filter id="oggrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="2"/>
      <feColorMatrix values="0 0 0 0 0.19  0 0 0 0 0.09  0 0 0 0 0.16  0 0 0 0.08 0"/>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#ogbg)"/>
  <!-- soft sky blob -->
  <ellipse cx="950" cy="180" rx="420" ry="300" fill="url(#ogblob)"/>
  <!-- brush strokes -->
  <path d="M 80 490 Q 360 450 680 490 T 1120 490" stroke="#301728" stroke-width="2" fill="none" opacity="0.35"/>
  <path d="M 60 530 Q 340 500 680 530 T 1140 530" stroke="#301728" stroke-width="1" fill="none" opacity="0.25"/>
  <!-- monogram plate -->
  <g font-family="Georgia, 'Times New Roman', serif" fill="#301728">
    <text x="80" y="250" font-size="96" font-style="italic" font-weight="300">tbrska</text>
    <text x="80" y="320" font-size="28" font-weight="400" fill="#4A2538" font-style="normal">— portréty &amp; abstrakce, malované ručně</text>
    <text x="80" y="420" font-size="22" font-style="italic" fill="#8FB8D4">Studio · CZ / SK · Originály na zakázku</text>
  </g>
  <!-- grain overlay -->
  <rect width="1200" height="630" fill="#F4EFEA" filter="url(#oggrain)" opacity="0"/>
  <!-- signature dot -->
  <circle cx="1110" cy="560" r="8" fill="#B7D4EA"/>
</svg>
